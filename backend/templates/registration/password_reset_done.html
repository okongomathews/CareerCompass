{% extends 'base.html' %}
{% block title %}Email Sent – CareerCompass Kenya{% endblock %}
{% block auth_content %}
<div class="flex-1 flex items-center justify-center py-12 px-4">
  <div class="w-full max-w-md text-center">
    <div class="bg-white rounded-2xl shadow-xl p-10">
      <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
        <i class="fas fa-envelope-circle-check text-green-500 text-2xl"></i>
      </div>
      <h1 class="text-2xl font-bold text-gray-900 mb-2">Check your email</h1>
      <p class="text-gray-500 text-sm mb-6">We've sent a password reset link. Check your inbox and spam folder.</p>
      <a href="{% url 'login' %}" class="inline-flex items-center gap-2 px-6 py-3 bg-blue-600 text-white rounded-xl font-semibold hover:bg-blue-700 transition text-sm">
        <i class="fas fa-arrow-left"></i> Back to Sign In
      </a>
    </div>
  </div>
</div>
{% endblock %}
