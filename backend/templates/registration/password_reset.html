{% extends 'base.html' %}
{% block title %}Reset Password – CareerCompass Kenya{% endblock %}
{% block auth_content %}
<div class="flex-1 flex items-center justify-center py-12 px-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="mx-auto w-16 h-16 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-2xl flex items-center justify-center shadow-lg mb-4">
        <i class="fas fa-key text-white text-2xl"></i>
      </div>
      <h1 class="text-2xl font-bold text-gray-900">Reset your password</h1>
      <p class="text-gray-500 mt-1 text-sm">Enter your email and we'll send a reset link</p>
    </div>
    <div class="bg-white rounded-2xl shadow-xl p-8">
      <form method="POST">{% csrf_token %}
        <div class="mb-5">
          <label class="block text-sm font-semibold text-gray-700 mb-1.5">Email Address</label>
          <input type="email" name="email" required class="form-input rounded-xl border-gray-300" placeholder="you@example.com">
        </div>
        <button type="submit" class="w-full py-3 bg-blue-600 text-white font-semibold rounded-xl hover:bg-blue-700 transition text-sm">
          Send Reset Link
        </button>
      </form>
      <p class="text-center text-sm text-gray-500 mt-4">
        <a href="{% url 'login' %}" class="text-blue-600 hover:underline">Back to Sign In</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
